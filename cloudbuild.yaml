# cloudbuild.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Google Cloud Build pipeline: builds the Docker image and deploys to Cloud Run.
#
# To deploy manually, run from the repo root:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions _ANTHROPIC_API_KEY="sk-ant-...",_GEMINI_API_KEY="AIza..."
#
# Or set up a Cloud Build trigger to auto-deploy on git push to main.
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  _SERVICE_NAME: brightedge-crawler          # Cloud Run service name
  _REGION: us-central1                       # cheapest GCP region for free tier
  _ANTHROPIC_API_KEY: ""                     # optional — Claude classification
  _GEMINI_API_KEY: ""                        # optional — Gemini classification

steps:

  # Step 1: Build the Docker image ($BUILD_ID always set; avoids empty COMMIT_SHA on manual submit)
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - "gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$BUILD_ID"
      - -t
      - "gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest"
      - .

  # Step 2: Push the image to Google Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$BUILD_ID"

  # Step 3: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE_NAME}"
      - --image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$BUILD_ID
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated            # public demo endpoint
      - --memory=512Mi                     # enough for BeautifulSoup parsing
      - --cpu=1
      - --min-instances=0                  # scale to zero when idle = free
      - --max-instances=10                 # cap to avoid surprise billing
      - --concurrency=80                   # Cloud Run default; each instance handles 80 reqs
      - --set-env-vars=ANTHROPIC_API_KEY=${_ANTHROPIC_API_KEY},GEMINI_API_KEY=${_GEMINI_API_KEY}

images:
  - "gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$BUILD_ID"
  - "gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest"
